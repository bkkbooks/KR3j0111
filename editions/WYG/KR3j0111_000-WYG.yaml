body:
  text: 提要辨言一卷雜家類三雜説之屬臣等謹案辨言一卷宋員興宗撰興宗宋史無傳其名僅見於姓氏急就篇所著有九華先生集世亦不傳惟永樂大典間為採入並錄集末所載當時祭文六首以諸文叅考其出處興宗盖蜀人字顯道始應召官太學再遷至著作郎乾道中以有所論劾奉祠而去終於潤州而趙汝愚所為文至以歐陽永叔蘇明允為比傾倒甚至盖亦獨立自好之士也此書載永樂大典中然不題九華集字疑於集外别行書中歴摭經傳史子下及宋代諸儒之説凡於理未安者各為之辨中間惟論公羊傳紀季入齊一條稱紀以千乗畏人為非乃因紹興時事而發未為切當若其辨尚書六宗舊解之誤禮記文王九齡之誕以及譏劉氏漢書刋誤為不知史家行文之法皆具有特識其他亦多中理要至以詩不待序而明而㫁序之作為非古則沿鄭樵之新説各存一解可矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1595d236ee9358d5a4d4132f6e21a5496959f55a5164d0c2ca36a1098c15275c
